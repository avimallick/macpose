name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build darwin/arm64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -ldflags "-X github.com/avimallick/macpose/internal/version.Version=${VERSION}" \
            -o macpose ./cmd/macpose
          tar czf macpose-${GITHUB_REF_NAME}-darwin-arm64.tar.gz macpose

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: macpose-*.tar.gz
          generate_release_notes: true
